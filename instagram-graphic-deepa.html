<!DOCTYPE html>
<html lang="kn" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>ದೀಪ launch — square</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;700;800&family=Noto+Sans+Bengali:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1080px; overflow:hidden; }
  .canvas {
    width:1080px; height:1080px; position:relative; overflow:hidden;
    background: radial-gradient(ellipse at 25% 10%, #1e3a4a 0%, #131f24 55%, #0d161a 100%);
    color:#fff; font-family:'Noto Sans Kannada', sans-serif;
    padding:70px; display:flex; flex-direction:column; align-items:center;
    text-align:center;
  }
  .new-badge {
    position:absolute; top:64px; right:70px;
    background:#ffd900; color:#131f24; font-weight:800;
    font-size:26px; padding:10px 28px; border-radius:999px;
    transform:rotate(4deg);
  }
  .eyebrow { font-size:28px; letter-spacing:1px; color:#9db2bd; margin-top:40px; }
  .headline { font-size:120px; font-weight:800; line-height:1.15; margin:6px 0 2px; }
  .headline .lamp { font-size:96px; }
  .headline .name { color:#1cb0f6; }
  .sub { font-size:40px; color:#bde3ff; font-weight:700; margin-bottom:44px; }
  .pair-stack { display:flex; flex-direction:column; gap:20px; margin-bottom:48px; }
  .pair {
    display:flex; align-items:center; justify-content:center; gap:20px;
    background:rgba(255,255,255,.07); border:2px solid #2e414b;
    border-radius:22px; padding:16px 44px; min-width:640px;
  }
  .pair .bn { font-family:'Noto Sans Bengali', sans-serif; font-size:46px; font-weight:700; color:#58cc02; }
  .pair .ar { font-size:30px; color:#9db2bd; }
  .pair .kn { font-size:44px; font-weight:700; color:#1cb0f6; }
  .chips { display:flex; gap:14px; flex-wrap:nowrap; justify-content:center; }
  .chip {
    background:rgba(255,255,255,.08); border:2px solid #2e414b;
    border-radius:999px; padding:10px 22px; font-size:26px;
    white-space:nowrap;
  }
  .footer {
    position:absolute; left:70px; right:70px; bottom:60px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .url {
    background:#1cb0f6; color:#fff; font-weight:800;
    font-size:30px; padding:16px 40px; border-radius:999px;
    font-family:system-ui, sans-serif;
  }
  .free { font-size:28px; color:#9db2bd; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="new-badge">ಹೊಸದು!</div>
    <div class="eyebrow">ಕನ್ನಡಿಗರಿಗಾಗಿ</div>
    <div class="headline"><span class="lamp">🪔</span> <span class="name">ದೀಪ</span></div>
    <div class="sub">ಈಗ ಕನ್ನಡದಲ್ಲೇ ಬೆಂಗಾಲಿ ಕಲಿಯಿರಿ</div>
    <div class="pair-stack">
      <div class="pair"><span class="bn">নমস্কার</span><span class="ar">=</span><span class="kn">ನೊಮೋಶ್ಕಾರ್</span></div>
      <div class="pair"><span class="bn">ধন্যবাদ</span><span class="ar">=</span><span class="kn">ಧೊನ್ನೊಬಾದ್</span></div>
      <div class="pair"><span class="bn">জল</span><span class="ar">=</span><span class="kn">ಜೊಲ್ (ನೀರು)</span></div>
    </div>
    <div class="chips">
      <span class="chip">🔤 ಅಕ್ಷರ</span>
      <span class="chip">💬 ದೈನಂದಿನ ವಾಕ್ಯ</span>
      <span class="chip">🗣️ ಕೇಳಿ ಕಲಿಯಿರಿ</span>
      <span class="chip">🎯 ಕ್ವಿಜ್</span>
    </div>
    <div class="footer">
      <span class="free">೧೦೦% ಉಚಿತ · ಖಾತೆ ಬೇಕಿಲ್ಲ</span>
      <span class="url">dipamoy.site/bengali/</span>
    </div>
  </div>
</body>
</html>
