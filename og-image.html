<!DOCTYPE html>
<html lang="bn" translate="no">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700;800&family=Noto+Sans+Kannada:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "Noto Sans Bengali", sans-serif;
    background: linear-gradient(135deg, #131f24 0%, #1b3a1e 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 90px;
  }
  .left h1 { font-size: 110px; font-weight: 800; line-height: 1.1; }
  .left h1 .lamp { font-size: 90px; }
  .left .tag { font-size: 40px; color: #d7ffb8; margin-top: 18px; font-weight: 700; }
  .left .sub { font-size: 30px; color: #9db2bd; margin-top: 10px; }
  .left .url {
    display: inline-block; margin-top: 36px;
    background: #58cc02; color: #fff; font-weight: 700;
    font-size: 30px; padding: 14px 34px; border-radius: 999px;
    font-family: system-ui, sans-serif;
  }
  .right { display: flex; flex-direction: column; gap: 22px; }
  .pair {
    display: flex; align-items: center; gap: 24px;
    background: rgba(255,255,255,.07);
    border: 3px solid #2e414b; border-radius: 24px;
    padding: 18px 34px;
  }
  .pair .bn { font-size: 64px; font-weight: 700; color: #1cb0f6; }
  .pair .arrow { font-size: 40px; color: #9db2bd; }
  .pair .kn { font-family: "Noto Sans Kannada", sans-serif; font-size: 64px; font-weight: 700; color: #58cc02; }
</style>
</head>
<body>
  <div class="left">
    <h1><span class="lamp">🪔</span> DipaMoy</h1>
    <div class="tag">বাঙালিদের জন্য সহজ কন্নড়</div>
    <div class="sub">অক্ষর · দৈনন্দিন বাক্য · উচ্চারণ সহ — বিনামূল্যে</div>
    <div class="url">dipamoy.site</div>
  </div>
  <div class="right">
    <div class="pair"><span class="bn">ক</span><span class="arrow">→</span><span class="kn">ಕ</span></div>
    <div class="pair"><span class="bn">নমস্কার</span><span class="arrow">→</span><span class="kn">ನಮಸ್ಕಾರ</span></div>
    <div class="pair"><span class="bn">ধন্যবাদ</span><span class="arrow">→</span><span class="kn">ಧನ್ಯವಾದ</span></div>
  </div>
</body>
</html>
