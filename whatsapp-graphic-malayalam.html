<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>DipaMoy — now Kannada ⟷ Malayalam too</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@700;800&family=Noto+Sans+Kannada:wght@700;800&family=Noto+Sans+Malayalam:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: system-ui, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #131f24 0%, #1b3a1e 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 60px 70px;
    position: relative;
  }
  /* soft glow accents */
  body::before {
    content: ""; position: absolute; top: -160px; right: -120px;
    width: 460px; height: 460px; border-radius: 50%;
    background: radial-gradient(circle, rgba(88,204,2,.20) 0%, transparent 70%);
  }
  body::after {
    content: ""; position: absolute; bottom: -180px; left: 320px;
    width: 420px; height: 420px; border-radius: 50%;
    background: radial-gradient(circle, rgba(28,176,246,.14) 0%, transparent 70%);
  }
  .left { position: relative; z-index: 2; max-width: 560px; }
  .brand { font-size: 96px; font-weight: 800; line-height: 1.05; letter-spacing: -1px; }
  .brand .lamp { font-size: 80px; }
  .tag { font-size: 46px; color: #eafff0; margin-top: 22px; font-weight: 800; line-height: 1.18; }
  .tag .hi { color: #7ee83f; }
  .sub { font-size: 27px; color: #9db2bd; margin-top: 14px; font-weight: 500; }
  .url {
    display: inline-block; margin-top: 40px;
    background: #58cc02; color: #fff; font-weight: 800;
    font-size: 30px; padding: 15px 40px; border-radius: 999px;
    box-shadow: 0 10px 30px rgba(88,204,2,.35);
  }

  .right { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 22px; }
  .pair {
    position: relative;
    display: flex; align-items: center; gap: 26px;
    background: rgba(255,255,255,.07);
    border: 3px solid #2e414b; border-radius: 26px;
    padding: 22px 40px; justify-content: center;
  }
  .pair.new { border-color: #ffc800; background: rgba(255,200,0,.10); }
  .arrow { font-size: 40px; color: #9db2bd; }
  .bn { font-family: "Noto Sans Bengali", sans-serif; font-size: 58px; font-weight: 700; color: #1cb0f6; }
  .kn { font-family: "Noto Sans Kannada", sans-serif; font-size: 58px; font-weight: 700; color: #58cc02; }
  .ml { font-family: "Noto Sans Malayalam", sans-serif; font-size: 58px; font-weight: 700; color: #ffc800; }
  .badge {
    position: absolute; top: -18px; right: -14px;
    background: #ffc800; color: #131f24; font-weight: 800;
    font-size: 20px; letter-spacing: 1px; padding: 6px 16px; border-radius: 999px;
    box-shadow: 0 6px 16px rgba(0,0,0,.35);
  }
  .letters {
    display: flex; align-items: center; justify-content: center; gap: 22px;
    color: #9db2bd; font-size: 26px; margin-top: 2px;
  }
  .letters .g { font-size: 52px; font-weight: 800; }
</style>
</head>
<body>
  <div class="left">
    <div class="brand"><span class="lamp">🪔</span> DipaMoy</div>
    <div class="tag">Learn <span class="hi">Kannada</span><br>in your own script</div>
    <div class="sub">through Bengali or Malayalam — and back · free</div>
    <div class="url">dipamoy.site</div>
  </div>

  <div class="right">
    <div class="pair">
      <span class="bn">বাংলা</span><span class="arrow">⟷</span><span class="kn">ಕನ್ನಡ</span>
    </div>
    <div class="pair new">
      <span class="badge">✨ NEW</span>
      <span class="kn">ಕನ್ನಡ</span><span class="arrow">⟷</span><span class="ml">മലയാളം</span>
    </div>
    <div class="letters">
      <span class="g" style="color:#1cb0f6;font-family:'Noto Sans Bengali'">ক</span>·
      <span class="g" style="color:#58cc02;font-family:'Noto Sans Kannada'">ಕ</span>·
      <span class="g" style="color:#ffc800;font-family:'Noto Sans Malayalam'">ക</span>
      <span>one family of scripts</span>
    </div>
  </div>
</body>
</html>
